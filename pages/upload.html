<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Attendees | EventPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/upload.css" />
</head>
<body>

  <main class="ul-wrapper">

    <!-- Header -->
    <header class="ul-header">
      <div class="ul-header__icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"
            stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="17 8 12 3 7 8"
            stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="3" x2="12" y2="15"
            stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="ul-header__text">
        <h1 class="ul-header__title">Upload Files</h1>
        <p class="ul-header__sub">Select and upload the files of your choice</p>
      </div>
    </header>

    <!-- Drop zone -->
    <section class="ul-drop-zone" id="dropZone"
      role="button" tabindex="0"
      aria-label="Click or drag and drop to upload CSV file">

      <input type="file" id="fileInput"
        accept=".csv,text/csv" hidden />

      <div class="ul-drop-zone__inner">
        <button type="button" class="ul-upload-btn" id="uploadBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <polyline points="17 8 12 3 7 8"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="3" x2="12" y2="15"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Upload
        </button>
        <p class="ul-drop-zone__text">
          Choose a File or drag &amp; drop it here
        </p>
        <small class="ul-drop-zone__hint">Maximum of 500 MB file size</small>
      </div>

    </section>

    <!-- File list -->
    <section class="ul-file-list" id="fileList" aria-label="Uploaded files" aria-live="polite"></section>

  </main>

  <!-- auth-service must load first -->
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/upload.js"></script>

</body>
</html>
