<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventPro — Create an Event</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/create-event.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        <img
          src="../assets/images/EventLogo.png"
          alt="EventPro Logo"
          class="nav-logo-icon"
        />
        <span class="nav-logo-text">EventPro</span>
      </div>

      <div class="nav-links">
        <a href="../pages/dashboard.html">Discover Events</a>
        <a href="../pages/create-event.html" class="active">Create Event</a>
        <a href="../pages/organizer-dashboard.html">My Events</a>
      </div>

      <div class="nav-right">
        <div
          class="avatar-placeholder"
          id="navAvatar"
          aria-label="User menu"
        ></div>
        <button
          type="button"
          class="hamburger"
          id="hamburgerBtn"
          aria-label="Open menu"
        >
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <line
              x1="3"
              y1="6"
              x2="21"
              y2="6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <line
              x1="3"
              y1="12"
              x2="21"
              y2="12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <line
              x1="3"
              y1="18"
              x2="21"
              y2="18"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>
    </nav>

    <!-- MOBILE NAV DRAWER -->
    <div class="nav-drawer" id="navDrawer">
      <a href="../pages/dashboard.html">Discover Events</a>
      <a href="../pages/create-event.html" class="active">Create Event</a>
      <a href="../pages/organizer-dashboard.html">My Events</a>
    </div>

    <!-- PAGE -->
    <div class="page">
      <!-- Back arrow -->
      <div class="top-row">
        <button
          type="button"
          class="back-arrow"
          id="backBtn"
          aria-label="Go back"
        >
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M19 12H5M5 12l7 7M5 12l7-7"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>

      <!-- Heading -->
      <div class="heading">
        <h1>Create an Event</h1>
        <p class="subtitle">
          Ready to bring people together? Add your event details below.
        </p>
      </div>

      <!-- Form -->
      <div class="event-form">
        <!-- Row 1: Event Name -->
        <div class="form-row">
          <div class="input-block">
            <label for="eventName">Event Name</label>
            <input type="text" id="eventName" placeholder="Event Name" />
            <span class="input-error" id="eventNameError"></span>
          </div>
        </div>

        <!-- Row 2: Event Date + Event Time -->
        <div class="form-row two-col">
          <div class="input-block">
            <label for="eventDate">Event Date</label>
            <input type="date" id="eventDate" class="input-grey" />
            <span class="input-error" id="eventDateError"></span>
          </div>
          <div class="input-block">
            <label for="eventTime">Event Time</label>
            <input type="time" id="eventTime" class="input-grey" />
            <span class="input-error" id="eventTimeError"></span>
          </div>
        </div>

        <!-- Row 3: Event Location + Street Address + City -->
        <div class="form-row three-col">
          <div class="input-block">
            <label for="eventLocation">Event Location</label>
            <input
              type="text"
              id="eventLocation"
              placeholder="Event Location"
            />
            <span class="input-error" id="eventLocationError"></span>
          </div>
          <div class="input-block">
            <label for="streetAddress">Street Address</label>
            <input
              type="text"
              id="streetAddress"
              placeholder="Street Address"
            />
            <span class="input-error" id="streetAddressError"></span>
          </div>
          <div class="input-block">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="City" />
            <span class="input-error" id="cityError"></span>
          </div>
        </div>

        <!-- Row 4: Country/State + Event Region -->
        <div class="form-row two-col">
          <div class="input-block">
            <label for="countryState">Country / State</label>
            <input
              type="text"
              id="countryState"
              placeholder="Country / State"
            />
            <span class="input-error" id="countryStateError"></span>
          </div>
          <div class="input-block">
            <label for="eventRegion">Event Region</label>
            <div class="select-wrap">
              <select id="eventRegion">
                <option value="" disabled selected>Select Event Region</option>
                <option value="north">North</option>
                <option value="south">South</option>
                <option value="east">East</option>
                <option value="west">West</option>
              </select>
              <svg
                class="select-arrow"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M6 9l6 6 6-6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <span class="input-error" id="eventRegionError"></span>
          </div>
        </div>

        <!-- Row 5: Event Category + Event Banner -->
        <div class="form-row two-col">
          <div class="input-block">
            <label for="eventCategory">Event Category</label>
            <div class="select-wrap">
              <select id="eventCategory">
                <option value="" disabled selected>Select Category</option>
                <option value="music">Music</option>
                <option value="sports">Sports</option>
                <option value="tech">Tech</option>
                <option value="food">Food</option>
                <option value="art">Art</option>
                <option value="business">Business</option>
              </select>
              <svg
                class="select-arrow"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M6 9l6 6 6-6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <span class="input-error" id="eventCategoryError"></span>
          </div>
          <div class="input-block">
            <label for="bannerInput">Event Banner</label>
            <div
              class="upload-wrap"
              id="uploadWrap"
              role="button"
              tabindex="0"
              aria-label="Upload event banner image"
            >
              <span id="uploadLabel">Upload Image</span>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <rect
                  x="3"
                  y="3"
                  width="18"
                  height="18"
                  rx="2"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" />
                <path
                  d="M21 15l-5-5L5 21"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <input type="file" id="bannerInput" accept="image/*" />
            </div>
            <span class="input-error" id="bannerError"></span>
          </div>
        </div>

        <!-- Row 6: Event Description -->
        <div class="form-row">
          <div class="input-block">
            <label for="eventDescription">Event Description</label>
            <textarea
              id="eventDescription"
              placeholder="Please include all necessary details for the event..."
            ></textarea>
            <span class="input-error" id="eventDescriptionError"></span>
          </div>
        </div>

        <!-- Global error -->
        <p class="form-error" id="formError"></p>

        <!-- Submit -->
        <div class="form-row">
          <button type="button" class="btn-create" id="submitBtn">
            Create Event
          </button>
        </div>
      </div>
    </div>

    <script src="../js/services/auth-service.js"></script>
    <script src="../js/create-event.js"></script>
  </body>
</html>
