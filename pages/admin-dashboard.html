<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | EventPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../styles/dashboard-layout.css" />
  <link rel="stylesheet" href="../styles/admin-dashboard.css" />
  <!-- Chart.js loaded dynamically in admin-dashboard.js — not here -->
</head>
<body>
  <div class="dashboard-shell">

    <div id="sidebarSlot"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="dashboard-main">
      <div id="topbarSlot"></div>

      <main class="dashboard-content">

        <!-- Page heading + Add Organizer btn (admin only) -->
        <div class="page-heading">
          <div class="page-heading__left">
            <h1 class="page-title">Admin Dashboard</h1>
            <p class="page-breadcrumb">
              <span class="breadcrumb-parent">Admin</span>
              <span class="breadcrumb-sep"> / </span>
              <a href="../pages/admin-dashboard.html" class="breadcrumb-current">
                Dashboard
              </a>
            </p>
          </div>
          <!-- Only visible to admin — toggled in admin-dashboard.js -->
          <button type="button" class="btn-add-organizer" id="btnAddOrganizer"
            aria-label="Add new organizer" hidden>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            Add Organizer
          </button>
        </div>

        <!-- Stat cards — JS replaces skeletons on load -->
        <div class="stat-cards" id="statCards">
          <div class="stat-card skeleton" aria-hidden="true"></div>
          <div class="stat-card skeleton" aria-hidden="true"></div>
          <div class="stat-card skeleton" aria-hidden="true"></div>
        </div>

        <!-- Middle grid: Recent Events + Top Organizers -->
        <div class="dashboard-grid">

          <div class="card">
            <div class="section-header">
              <h2 class="section-title">Recent Events</h2>
              <!-- View all events -->
              <a href="../pages/attendees.html?tab=events" class="btn-analytics">
                Event Analytics
              </a>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Event</th>
                    <th>Date</th>
                    <th>Attendees</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="recentEventsBody">
                  <tr>
                    <td colspan="4">
                      <div class="spinner" role="status"
                        aria-label="Loading events"></div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="card">
            <div class="section-header">
              <h2 class="section-title">Top Organizers</h2>
              <!-- View full organizer list -->
              <a href="../pages/organizer-management.html" class="btn-analytics">
                View All
              </a>
            </div>
            <div id="topOrganizersList">
              <div class="spinner" role="status"
                aria-label="Loading organizers"></div>
            </div>
          </div>

        </div>

        <!-- Attendance chart -->
        <div class="card chart-card">
          <h2 class="section-title chart-title">Attendance Overview</h2>
          <div class="chart-wrap">
            <canvas id="attendanceChart"
              aria-label="Monthly attendance overview chart"
              role="img"></canvas>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Add Organizer Modal (admin only) -->
  <div class="om-modal-overlay" id="addOrgModalOverlay"
    role="dialog" aria-modal="true"
    aria-labelledby="addOrgModalTitle" hidden>
    <div class="om-modal">
      <button type="button" class="om-modal-close"
        id="addOrgModalClose" aria-label="Close modal">
        <svg viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6"  x2="6"  y2="18"/>
          <line x1="6"  y1="6"  x2="18" y2="18"/>
        </svg>
      </button>
      <header class="om-modal-header">
        <h2 id="addOrgModalTitle">Add New Organizer</h2>
        <p>Fill in the details to invite a new organizer to EventPro</p>
      </header>
      <form id="addOrganizerForm" novalidate>
        <div class="om-form-row om-two-col">
          <div class="om-form-group">
            <label for="orgFirstName">
              First Name <span class="om-required">*</span>
            </label>
            <input class="om-input" id="orgFirstName" type="text"
              placeholder="Alex" autocomplete="given-name" />
            <span class="om-field-error" id="orgFirstNameError"></span>
          </div>
          <div class="om-form-group">
            <label for="orgLastName">
              Last Name <span class="om-required">*</span>
            </label>
            <input class="om-input" id="orgLastName" type="text"
              placeholder="Johnson" autocomplete="family-name" />
            <span class="om-field-error" id="orgLastNameError"></span>
          </div>
        </div>
        <div class="om-form-row">
          <div class="om-form-group">
            <label for="orgEmail">
              Email address <span class="om-required">*</span>
            </label>
            <input class="om-input" id="orgEmail" type="email"
              placeholder="organizer@example.com" autocomplete="email" />
            <span class="om-field-error" id="orgEmailError"></span>
          </div>
        </div>
        <div class="om-form-row">
          <div class="om-form-group">
            <label for="orgPhone">Phone Number</label>
            <div class="om-phone-wrap">
              <span class="om-phone-prefix">+234</span>
              <input class="om-input" id="orgPhone" type="tel"
                placeholder="21-30-47-97" autocomplete="tel-national" />
            </div>
            <span class="om-field-error" id="orgPhoneError"></span>
          </div>
        </div>
        <hr class="om-form-divider" />
        <!-- Global modal error -->
        <div class="om-modal-error" id="addOrgError" hidden></div>
        <div class="om-modal-actions">
          <button type="button" class="om-btn-cancel" id="addOrgCancel">Cancel</button>
          <button type="submit" class="om-btn-submit" id="addOrgSubmit">
            <span class="om-modal-spinner" id="addOrgSpinner" hidden></span>
            <span id="addOrgLabel">Add Organizer</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Script load order — DO NOT change -->
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/utils/load-components.js"></script>
  <script src="../js/admin-dashboard.js"></script>
</body>
</html>
