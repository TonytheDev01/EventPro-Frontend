<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're All Set — EventPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../styles/youre-all-set.css">
</head>
<body>

  <div class="card">

    <!-- Success icon -->
    <div class="check-circle">
      <img src="../assets/images/check-icon.png" alt="Success checkmark" />
    </div>

    <!-- Content -->
    <div class="card__content">
      <h1 class="card__title">You're All Set!</h1>
      <p class="card__message">
        A confirmation email has been sent to
        <strong id="mail"></strong>
      </p>
    </div>

    <!-- CTA button -->
    <button type="button" id="view-event" class="btn btn--success">
      View My Event
    </button>

  </div>

  <script src="../js/services/auth-service.js"></script>
  <script src="../js/youre-all-set.js"></script>

</body>
</html>
