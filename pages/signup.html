<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventPro — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../styles/form-input.css" />
  <link rel="stylesheet" href="../styles/signup.css" />
</head>
<body>

  <div class="page-wrapper">

    <!-- Illustration -->
    <div class="illustration-card">
      <img
        src="../assets/images/image.png"
        alt="Sign up illustration"
      />
    </div>

    <!-- Sign Up Form -->
    <div class="form-card">
      <h1 class="form-title">Sign Up</h1>

      <!-- Inline feedback banners -->
      <div class="form-banner form-banner--error"   id="formError"   role="alert"  aria-live="polite" hidden></div>
      <div class="form-banner form-banner--success" id="formSuccess" role="status" aria-live="polite" hidden></div>

      <form class="signup-form" id="signupForm" novalidate>

        <!-- First Name -->
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input
            type="text"
            id="firstName"
            placeholder="Enter here..."
            autocomplete="given-name"
          />
          <span class="helper-text"></span>
        </div>

        <!-- Last Name -->
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            placeholder="Enter here..."
            autocomplete="family-name"
          />
          <span class="helper-text"></span>
        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-with-icon">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="22,6 12,13 2,6"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              placeholder="Enter email address"
              autocomplete="email"
            />
          </div>
          <span class="helper-text"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-with-icon">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              placeholder="Enter password"
              autocomplete="new-password"
            />
            <!-- ✅ ADDED: password visibility toggle -->
            <button type="button" class="toggle-password"
              id="togglePassword" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <span class="helper-text"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-with-icon">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Enter password"
              autocomplete="new-password"
            />
            <!-- ✅ ADDED: confirm password visibility toggle -->
            <button type="button" class="toggle-password"
              id="toggleConfirmPassword" aria-label="Show confirm password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3"
                  stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <span class="helper-text"></span>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="submitBtn">
          Create Account
        </button>

        <p class="signin-text">
          Already have an account?
          <a href="sign-in.html" class="signin-link">Sign in</a>
        </p>

      </form>
    </div>

  </div>

  <!-- Script load order — DO NOT change -->
  <script src="../js/form-input.js"></script>
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/signup.js"></script>

</body>
</html>
