<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | EventPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/auth-reset-password.css" />
</head>
<body>

  <main class="rp-container">

    <!-- Illustration — hidden on mobile -->
    <div class="rp-image-wrap" aria-hidden="true">
      <img
        src="../assets/images/forget.jpg"
        alt=""
        class="rp-image"
      />
    </div>

    <!-- Form Side -->
    <div class="rp-form-wrap">

      <!-- Logo -->
      <a href="../pages/sign-in.html" class="rp-logo" aria-label="EventPro home">
        <img src="../assets/images/logo.png" alt="EventPro" height="36" />
      </a>

      <h1 class="rp-title">Reset Password</h1>
      <p class="rp-subtitle">Enter your new password and verify your identity.</p>

      <!-- Inline feedback banners -->
      <div class="rp-alert rp-alert--error"   id="rpError"   role="alert"  aria-live="polite" hidden></div>
      <div class="rp-alert rp-alert--success" id="rpSuccess" role="status" aria-live="polite" hidden></div>

      <form id="resetPasswordForm" class="rp-form" novalidate>

        <!-- New Password -->
        <div class="rp-field">
          <label for="newPassword" class="rp-label">New Password</label>
          <div class="rp-input-wrap">
            <span class="rp-input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="newPassword"
              class="rp-input rp-input--icon"
              placeholder="Enter password"
              autocomplete="new-password"
              required
            />
            <button type="button" class="rp-eye" data-target="newPassword" aria-label="Toggle password visibility">
              <svg class="rp-eye__icon" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="rp-field-err" id="newPasswordErr"></span>
        </div>

        <!-- Confirm Password -->
        <div class="rp-field">
          <label for="confirmPassword" class="rp-label">Confirm Password</label>
          <div class="rp-input-wrap">
            <input
              type="password"
              id="confirmPassword"
              class="rp-input"
              placeholder="Enter password"
              autocomplete="new-password"
              required
            />
            <button type="button" class="rp-eye" data-target="confirmPassword" aria-label="Toggle confirm password visibility">
              <svg class="rp-eye__icon" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="rp-field-err" id="confirmPasswordErr"></span>
        </div>

        <!-- Verification Code -->
        <div class="rp-field">
          <label for="verificationCode" class="rp-label">Verification Code</label>
          <div class="rp-code-wrap">
            <input
              type="text"
              id="verificationCode"
              class="rp-input rp-input--code"
              placeholder="Enter password"
              autocomplete="one-time-code"
              inputmode="numeric"
              maxlength="6"
            />
            <button type="button" class="rp-btn-send" id="sendCodeBtn">
              Send code
            </button>
          </div>
          <span class="rp-field-err" id="verificationCodeErr"></span>
        </div>

        <!-- Submit -->
        <button type="submit" class="rp-btn-submit" id="submitBtn">
          Submit
        </button>

      </form>

      <p class="rp-back">
        Remember your password?
        <a href="../pages/sign-in.html" class="rp-back__link">Sign In</a>
      </p>

    </div>
  </main>

  <!-- auth-service must load first — provides resetPassword() -->
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/auth-reset-password.js"></script>

</body>
</html>
