<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - EventPro</title>
    <link rel="stylesheet" href="../styles/forget-password.css" />
</head>

  <body>

    <div class="container">

      <div class="image-panel">
        <img
          src="../assets/images/forgot-password.png"
          alt="Reset Password Illustration"
          class="illustration"
        />
      </div>

      <div class="form-panel">

        <div class="form-header">
          <a href="./signin.html" class="back-arrow" aria-label="Back to Login">&#8592;</a>
          <h1 class="form-title">Reset Password</h1>
        </div>

        <form class="reset-form" id="resetPasswordForm" novalidate>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M22 7l-10 7L2 7"/>
                </svg>
              </span>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="Enter email address"
                autocomplete="email"
                required
              />
            </div>
            <span class="error-message" id="emailError" role="alert"></span>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">
            Send Reset Link
          </button>

          <a href="./signin.html" class="back-to-login">Back to Login</a>

        </form>

      </div>

    </div>

    <script src="../js/forget-password.js"></script>

  </body>

</html>
