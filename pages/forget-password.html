<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | EventPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/forget-password.css" />
</head>
<body>
  <div class="fp-container">
    <!-- Image panel — hidden on mobile, shown on desktop -->
    <div class="fp-image-panel" aria-hidden="true">
      <img
        src="../assets/images/forget-password.png"
        alt=""
        class="fp-illustration"
      />
    </div>
    <!-- Form panel -->
    <div class="fp-form-panel">
      <!-- Logo -->
      <a href="../pages/sign-in.html" class="fp-logo" aria-label="EventPro home">
        <img src="../assets/images/logo.png" alt="EventPro" height="36" />
      </a>
      <!-- Header -->
      <div class="fp-form-header">
        <a href="../pages/sign-in.html" class="fp-back-arrow" aria-label="Back to sign in">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
        </a>
        <h1 class="fp-title">Forgot Password</h1>
      </div>
      <p class="fp-subtitle">
        Enter your email address and we'll send you a link to reset your password.
      </p>
      <!-- Inline feedback banners -->
      <div class="fp-alert fp-alert--error"   id="fpError"   role="alert"  aria-live="polite" hidden></div>
      <div class="fp-alert fp-alert--success" id="fpSuccess" role="status" aria-live="polite" hidden></div>
      <!-- Form -->
      <form class="fp-form" id="forgotPasswordForm" novalidate>
        <div class="fp-form-group">
          <label for="email" class="fp-label">Email Address</label>
          <div class="fp-input-wrap">
            <span class="fp-input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M22 7l-10 7L2 7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              class="fp-input"
              placeholder="Enter email address"
              autocomplete="email"
              required
            />
          </div>
          <span class="fp-field-err" id="emailError" role="alert"></span>
        </div>
        <button type="submit" class="fp-btn-submit" id="submitBtn">
          Send Reset Link
        </button>
      </form>

      <!-- ── Reset Password direct link ── -->
      <!-- Shown below the form so users who already have a code
           can jump straight to the reset screen without waiting for email -->
      <div class="fp-reset-link-wrap">
        <span class="fp-reset-link-text">Already have a code?</span>
        <a href="../pages/auth-reset-password.html" class="fp-reset-link">
          Reset Password
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </a>
      </div>

      <a href="../pages/sign-in.html" class="fp-back-to-login">
        &#8592; Back to Login
      </a>
    </div>
  </div>
  <!-- auth-service must load first — provides forgotPassword() -->
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/forget-password.js"></script>
</body>
</html>
