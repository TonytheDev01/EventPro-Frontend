<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Accounts | EventPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/dashboard-layout.css" />
  <link rel="stylesheet" href="../styles/organizer-accounts.css" />
</head>
<body>

  <div class="dashboard-shell">

    <div id="sidebarSlot"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="dashboard-main">

      <div id="topbarSlot"></div>

      <main class="dashboard-content">

        <!-- Header -->
        <div class="oa-header">
          <button type="button" class="oa-back-btn" id="backBtn" aria-label="Go back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              aria-hidden="true">
              <path d="M19 12H5M5 12l7 7M5 12l7-7"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div>
            <h1 class="oa-title">Organizer Accounts</h1>
            <p class="page-breadcrumb">
              <span class="breadcrumb-parent">Admin</span>
              <span class="breadcrumb-sep"> / </span>
              <a href="../pages/organizer-management.html" class="breadcrumb-current">Organizers</a>
              <span class="breadcrumb-sep"> / </span>
              <span class="breadcrumb-current">Account</span>
            </p>
          </div>
        </div>

        <!-- Controls -->
        <div class="oa-controls">
          <div class="oa-search-wrapper">
            <svg class="oa-search-icon" width="16" height="16"
              viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="8"
                stroke="currentColor" stroke-width="2"/>
              <path d="M21 21l-4.35-4.35"
                stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input type="text" id="searchInput"
              class="oa-search-input"
              placeholder="Search by name or email" />
          </div>
          <select id="roleFilter" class="oa-select">
            <option value="all">All Roles</option>
            <option value="organizer">Organizer</option>
            <option value="admin">Admin</option>
            <option value="user">User</option>
          </select>
          <button type="button" class="oa-btn-add" id="addOrganizerBtn">
            + Add Organizer
          </button>
        </div>

        <!-- Table -->
        <div class="oa-table-container">
          <table id="usersTable">
            <thead>
              <tr>
                <th>Profile</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr class="oa-loading-row">
                <td colspan="6">
                  <div class="spinner" role="status"
                    aria-label="Loading organizers"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="oa-pagination" id="pagination"></div>

        <!-- Add / Edit Modal -->
        <div class="oa-modal-overlay" id="modalOverlay"
          role="dialog" aria-modal="true"
          aria-labelledby="modalTitle" style="display:none;">
          <div class="oa-modal">
            <h2 class="oa-modal__title" id="modalTitle">Add Organizer</h2>
            <div class="oa-modal__field">
              <label for="modalName">Full Name</label>
              <input type="text" id="modalName" placeholder="Full Name" />
            </div>
            <div class="oa-modal__field">
              <label for="modalEmail">Email Address</label>
              <input type="email" id="modalEmail" placeholder="Email Address" />
            </div>
            <div class="oa-modal__field">
              <label for="modalRole">Role</label>
              <select id="modalRole">
                <option value="organizer">Organizer</option>
                <option value="admin">Admin</option>
                <option value="user">User</option>
              </select>
            </div>
            <p class="oa-modal__error" id="modalError"></p>
            <div class="oa-modal__buttons">
              <button type="button" class="oa-btn-cancel" id="modalCancelBtn">Cancel</button>
              <button type="button" class="oa-btn-save"   id="modalSaveBtn">Save</button>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Script load order — DO NOT change -->
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/utils/load-components.js"></script>
  <script src="../js/organizer-accounts.js"></script>

</body>
</html>
