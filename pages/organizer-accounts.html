<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizer Accounts</title>
<link rel="stylesheet" href="organizer-accounts.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <button type="button" class="back-btn" id="backBtn" aria-label="Go back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
        xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M19 12H5M5 12l7 7M5 12l7-7"
          stroke="#222" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="header__title">Organizer Accounts</h1>
  </header>

  <!-- ── Controls ── -->
  <div class="controls">
    <div class="search-wrapper">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
        xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="11" r="8"
          stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"
          stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <input
        type="text"
        id="searchInput"
        placeholder="Search by name or email"
      />
    </div>

    <select id="roleFilter">
      <option value="all">All Roles</option>
      <option value="organizer">Organizer</option>
      <option value="admin">Admin</option>
      <option value="user">User</option>
    </select>

    <button type="button" class="btn btn--add" id="addOrganizerBtn">
      + Add Organizer
    </button>
  </div>

  <!-- ── Table ── -->
  <div class="table-container">
    <table id="usersTable">
      <thead>
        <tr>
          <th>Profile</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Populated by JS -->
        <tr class="loading-row">
          <td colspan="6">Loading organizers...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ── Pagination ── -->
  <div class="pagination" id="pagination"></div>

</div>

<script src="organizer-accounts.js"></script>

</body>
</html>
