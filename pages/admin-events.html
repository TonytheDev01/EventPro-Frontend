<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events | EventPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/dashboard-layout.css" />
  <link rel="stylesheet" href="../styles/admin-events.css" />
</head>
<body>

  <div class="dashboard-shell">

    <div id="sidebarSlot"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="dashboard-main">

      <div id="topbarSlot"></div>

      <main class="dashboard-content">

        <!-- Page heading — Create Event removed (organizer-only feature) -->
        <div class="ae-heading">
          <div class="ae-heading__left">
            <h1 class="page-title">Events</h1>
            <p class="page-breadcrumb">
              <span class="breadcrumb-parent">Admin</span>
              <span class="breadcrumb-sep"> / </span>
              <a href="../pages/admin-events.html" class="breadcrumb-current">Events</a>
            </p>
          </div>
        </div>

        <!-- Summary strip -->
        <div class="ae-summary" id="aeSummary">
          <div class="ae-summary__stat">
            <span class="ae-summary__label">Total Events</span>
            <strong class="ae-summary__value" id="sumTotal">—</strong>
          </div>
          <div class="ae-summary__divider"></div>
          <div class="ae-summary__stat">
            <span class="ae-summary__label">Active</span>
            <strong class="ae-summary__value ae-summary__value--active" id="sumActive">—</strong>
          </div>
          <div class="ae-summary__divider"></div>
          <div class="ae-summary__stat">
            <span class="ae-summary__label">Upcoming</span>
            <strong class="ae-summary__value ae-summary__value--upcoming" id="sumUpcoming">—</strong>
          </div>
          <div class="ae-summary__divider"></div>
          <div class="ae-summary__stat">
            <span class="ae-summary__label">Completed</span>
            <strong class="ae-summary__value ae-summary__value--completed" id="sumCompleted">—</strong>
          </div>
        </div>

        <!-- Controls -->
        <div class="ae-controls">
          <div class="ae-search-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
              <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input type="text" id="searchInput"
              class="ae-search" placeholder="Search events…"
              aria-label="Search events" />
          </div>
          <div class="ae-filters">
            <select id="filterStatus" class="ae-select">
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="upcoming">Upcoming</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
              <option value="draft">Draft</option>
            </select>
            <select id="filterCategory" class="ae-select">
              <option value="">All Categories</option>
              <option value="music">Music</option>
              <option value="sports">Sports</option>
              <option value="tech">Tech</option>
              <option value="food">Food</option>
              <option value="art">Art</option>
              <option value="business">Business</option>
            </select>
          </div>
        </div>

        <!-- Table card -->
        <div class="ae-table-card">
          <div class="ae-table-wrap">
            <table class="ae-table" id="eventsTable">
              <thead>
                <tr>
                  <th>Event</th>
                  <th>Organizer</th>
                  <th>Date</th>
                  <th>Location</th>
                  <th>Attendees</th>
                  <th>Category</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="eventsTableBody">
                <tr>
                  <td colspan="8">
                    <div class="spinner" role="status" aria-label="Loading events"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Table footer -->
          <div class="ae-table-footer">
            <p class="ae-footer-count" id="aeFooterCount">—</p>
            <nav class="ae-pagination" id="aePagination" aria-label="Events pagination"></nav>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Event detail drawer -->
  <div class="ae-drawer-overlay" id="drawerOverlay" style="display:none;">
    <aside class="ae-drawer" id="eventDrawer" role="dialog"
      aria-modal="true" aria-labelledby="drawerTitle">

      <div class="ae-drawer__head">
        <h2 class="ae-drawer__title" id="drawerTitle">Event Details</h2>
        <button type="button" class="ae-drawer__close" id="drawerClose" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="ae-drawer__body" id="drawerBody">
        <div class="spinner" role="status" aria-label="Loading event"></div>
      </div>

      <div class="ae-drawer__actions">
        <a href="#" class="ae-btn-view-attendees" id="drawerViewAttendees">
          View Attendees
        </a>
        <button type="button" class="ae-btn-deactivate" id="drawerDeactivate">
          Deactivate Event
        </button>
      </div>

    </aside>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Script load order — DO NOT change -->
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/utils/load-components.js"></script>
  <script src="../js/admin-events.js"></script>

</body>
</html>
