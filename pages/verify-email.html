<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventPro — Verify Email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../styles/verify-email.css" />
</head>
<body>

  <div class="page-wrapper">

    <!-- Illustration -->
    <div class="verify-image">
      <img src="../assets/images/verify-icon.png" alt="Email verification illustration" />
    </div>

    <!-- Heading -->
    <h1 class="check-heading">Check your inbox</h1>

    <!-- Body text -->
    <p class="verify-text">
      We have sent a verification link to
      <strong id="masked-email">your email</strong>.
      Click the link to activate your account and
      start managing your events.
    </p>

    <!-- Resend button -->
    <button id="resendBtn" class="btn-resend" type="button">
      Resend Verification Mail
    </button>

    <!-- Wrong email -->
    <p class="change-email">
      Wrong email?
      <a href="forgot-password.html" class="change-email-link">Change it</a>
    </p>

    <!-- Back to sign in -->
    <a href="sign-in.html" class="back-to-signin">
      Back to Login Page
    </a>

  </div>

  <script src="../js/services/auth-service.js"></script>
  <script src="../js/verify-email.js"></script>

</body>
</html>
