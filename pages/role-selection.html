<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Role Preference | EventPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/role-selection.css" />
</head>
<body>

  <main class="rp-container">

    <header class="rp-header">
      <h1 class="rp-title">Role Preference</h1>
      <p class="rp-subtitle">Select your preferred role to continue.</p>
    </header>

    <!-- Inline error banner -->
    <div class="rp-alert rp-alert--error" id="rpError" role="alert" aria-live="polite" hidden></div>

    <div class="rp-card">

      <div class="rp-options" role="radiogroup" aria-label="Select your role">

        <!-- Attendee -->
        <label class="rp-option" for="attendee">
          <input type="radio" name="role" id="attendee" value="user" checked />
          <div class="rp-option__content">
            <div class="rp-option__icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div class="rp-option__info">
              <h3 class="rp-option__name">An Attendee</h3>
              <p class="rp-option__desc">Continue as an attendee</p>
            </div>
            <div class="rp-option__status" aria-hidden="true">
              <div class="rp-unselected-circle"></div>
              <svg class="rp-selected-icon" width="22" height="22" viewBox="0 0 24 24"
                fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                  10-4.48 10-10S17.52 2 12 2zm-2 14.5l-4-4
                  1.41-1.41L10 13.67l6.59-6.59L18 8.5l-8 8z"/>
              </svg>
            </div>
          </div>
        </label>

        <!-- Organiser -->
        <label class="rp-option" for="organiser">
          <input type="radio" name="role" id="organiser" value="organizer" />
          <div class="rp-option__content">
            <div class="rp-option__icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <div class="rp-option__info">
              <h3 class="rp-option__name">An Organiser</h3>
              <p class="rp-option__desc">Continue as an organiser</p>
            </div>
            <div class="rp-option__status" aria-hidden="true">
              <div class="rp-unselected-circle"></div>
              <svg class="rp-selected-icon" width="22" height="22" viewBox="0 0 24 24"
                fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                  10-4.48 10-10S17.52 2 12 2zm-2 14.5l-4-4
                  1.41-1.41L10 13.67l6.59-6.59L18 8.5l-8 8z"/>
              </svg>
            </div>
          </div>
        </label>

        <!-- Vendor — coming soon -->
        <label class="rp-option rp-option--disabled" for="vendor">
          <input type="radio" name="role" id="vendor" value="vendor" disabled />
          <div class="rp-option__content">
            <div class="rp-option__icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0
                  2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
              </svg>
            </div>
            <div class="rp-option__info">
              <h3 class="rp-option__name">
                A Vendor
                <span class="rp-badge-soon">Coming Soon</span>
              </h3>
              <p class="rp-option__desc">Continue as a vendor</p>
            </div>
            <div class="rp-option__status" aria-hidden="true">
              <div class="rp-unselected-circle"></div>
            </div>
          </div>
        </label>

      </div>

      <button type="button" class="rp-btn-continue" id="continueBtn">
        Continue
      </button>

    </div>

  </main>

  <!-- Toast notification -->
  <div class="rp-toast" id="rpToast" role="status" aria-live="polite"></div>

  <script src="../js/services/auth-service.js"></script>
  <script src="../js/role-selection.js"></script>

</body>
</html>
