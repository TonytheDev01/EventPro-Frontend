<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Organizer Profile Review - EventPro</title>
    <link rel="stylesheet" href="../styles/dashboard-layout.css">
    <link rel="stylesheet" href="../styles/admin-dashboard-organizers.css">
</head>
<body>

  <div class="dashboard-shell">
    <div id="sidebarSlot"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="dashboard-main">

      <div id="topbarSlot"></div>

      <main class="dashboard-content">

        <div class="page-heading"> 
          <h1 class="page-title">Organizer Management</h1> 
          <p class="page-breadcrumb"> 
            <span class="breadcrumb-parent">Admin</span> 
            <span class="breadcrumb-sep"> / </span> 
            <a href="#" class="breadcrumb-current">Organizers</a> 
          </p> 
</div>
        </div>

        <div id="app">

    <p class="section-title">Organizer Profile Review</p>

    <div class="review-grid">

      <!-- Card 1: Basic Information -->
      <article class="card" aria-label="Organizer Basic Information">
        <h2 class="section-title">Organizer Basic Information</h2>

        <!-- Empty state shown until an organizer is loaded -->
        <div class="empty-state" id="basic-info-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <p>No organizer selected.<br/>Add or select an organizer to view their details.</p>
        </div>

        <!-- Info table -->
        <table class="info-table" id="basic-info-table" aria-live="polite">
          <tbody id="basic-info-tbody"></tbody>
        </table>

        <hr class="card-divider" id="card-divider"/>
      </article>

      <!-- ── Card 2: Verification Document ── -->
      <article class="card" aria-label="Verification Document">
        <h2 class="section-title">Verification Document</h2>

        <div class="upload-zone" id="upload-zone" role="button" tabindex="0" aria-label="Upload verification document">
          <input type="file" id="doc-file" accept="image/*,.pdf"
                 aria-label="Choose file"
                 onchange="handleFileChange(event)" />

          <div id="upload-placeholder">
 
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                
                 <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              
                 <polyline points="17 8 12 3 7 8"/>
              
                 <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            
            <span class="upload-label">Upload Document</span>
        
          </div>
          
          <div class="upload-preview" id="upload-preview">
            <img id="preview-img" src="" alt="Document preview" />
            <span class="file-name" id="preview-name"></span>
            <button class="remove-file" onclick="removeFile(event)" type="button">Remove</button>
          </div>
        
        </div>

        <div class="form-group">
        
          <label for="id-type">ID Type</label>
        
          <select class="form-control" id="id-type" onchange="clearFieldError('id-type')">
            <option value="">National ID / Passport / Driver License</option>
            <option value="national_id">National ID</option>
            <option value="passport">Passport</option>
            <option value="driver_license">Driver License</option>
          </select>
        
          <span class="field-error" id="id-type-error">Please select an ID type.</span>
        
        </div>

        <div class="form-group">
        
          <label for="id-number">ID Number</label>
          <input class="form-control" id="id-number" type="text"
                 placeholder="ID Number"
                 oninput="clearFieldError('id-number')" />
        
                 <span class="field-error" id="id-number-error">Please enter the ID number.</span>
        </div>

        <button class="btn-verify" id="btn-verify" onclick="handleVerify()" type="button">
          <span class="spinner" id="verify-spinner"></span>
          <span id="verify-label">Verify Document</span>
        </button>
      </article>

    </div>
  </div>

  <div id="toast" role="alert" aria-live="assertive"></div>
      </main>
    </div>
  </div>

  
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/utils/load-components.js"></script>
  <script src="../js/admin-dashboard-organizers.js"></script>
</body>
</html>
