<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Management - EventPro</title>
    <link rel="stylesheet" href="../styles/dashboard-layout.css">
    <link rel="stylesheet" href="../styles/organizer-management.css">
</head>
<body>
    <div class="dashboard-shell"> 
    
        <div id="sidebarSlot"></div> 
        
        <div class="sidebar-overlay" id="sidebarOverlay"></div> 
        
        <div class="dashboard-main"> 
            
            <div id="topbarSlot"></div> 
            
            <main class="dashboard-content"> 
                <div class="page-heading"> 
                    <h1 class="page-title">Organizer Management</h1> 
                    <p class="page-breadcrumb"> 
                        <span class="breadcrumb-parent">Admin</span> 
                        <span class="breadcrumb-sep"> / </span> 
                        <a href="#" class="breadcrumb-current">Organizers</a> 
                    </p> 
                </div> 
            <div class="modal-overlay" id="modal-overlay"
       role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">

      <button class="modal-close" id="btn-close" aria-label="Close modal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <header class="modal-header">
        <h2 id="modal-title">Add New Organizer</h2>
        <p>Fill in the details to invite a new organizer to EventPro</p>
      </header>

      <form id="add-organizer-form" novalidate>

        <div class="form-row two-col">
          <div class="form-group">
            <label for="first-name">First Name <span class="required-star">*</span></label>
            <input class="form-control" id="first-name" type="text"
                   placeholder="Alex" autocomplete="given-name"
                   oninput="clearErr('first-name')" />
            <span class="field-error" id="first-name-error">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              First name is required.
            </span>
          </div>
          <div class="form-group">
            <label for="last-name">Last Name <span class="required-star">*</span></label>
            <input class="form-control" id="last-name" type="text"
                   placeholder="Johnson" autocomplete="family-name"
                   oninput="clearErr('last-name')" />
            <span class="field-error" id="last-name-error">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              Last name is required.
            </span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="org-email">Email address <span class="required-star">*</span></label>
            <input class="form-control" id="org-email" type="text"
                   placeholder="organizer@example.com" autocomplete="email"
                   oninput="clearErr('org-email')" />
            <span class="field-error" id="org-email-error">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              A valid email address is required.
            </span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="org-phone">Phone Number</label>
            <div class="phone-wrapper" id="phone-wrapper">
              <span class="phone-prefix">+234</span>
              <input class="form-control" id="org-phone" type="tel"
                     placeholder="+234-21-30-47-97" autocomplete="tel-national"
                     oninput="clearErr('org-phone')" />
            </div>
            <span class="field-error" id="org-phone-error">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              Enter a valid phone number.
            </span>
          </div>
        </div>

        <hr class="form-divider" />

        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-submit">
            <span class="spinner" id="submit-spinner"></span>
            <span id="submit-label">Add Organizer</span>
          </button>
        </div>

      </form>
    </div>
  </div>
 
            </main> 
        </div> 
    </div> 

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script src="../js/services/auth-service.js"></script> 
    <script src="../js/utils/load-components.js"></script> 
    <script src="../js/organizer-management.js"></script>
</body>
</html>
