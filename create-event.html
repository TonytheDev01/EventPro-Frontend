<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventPro — Create an Event</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="create-event.css"/>
</head>
<body>

  <div class="page">
    <div class="card">

      <!-- BACK ARROW -->
      <button class="back-arrow" id="backArrow" onclick="prevStep()">&#8592;</button>

      <!-- HEADING -->
      <div class="heading">
        <h1>Create an Event</h1>
        <p class="subtitle">Ready to bring people together? Add your event details below.</p>
      </div>

      <!-- STEP 1 — Personal & Event Info -->
      <div class="step" id="step1">

        <div class="input-block">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="First Name"/>
        </div>

        <div class="input-block">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Last Name"/>
        </div>

        <div class="input-block">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Email Address"/>
        </div>

        <div class="input-block">
          <label for="eventName">Event Name</label>
          <input type="text" id="eventName" placeholder="Event Name"/>
        </div>

        <button class="btn-next" onclick="nextStep()">Next</button>

      </div>

      <!-- STEP 2 — Date, Time & Location -->
      <div class="step hidden" id="step2">

        <div class="input-block">
          <label for="eventDate">Event Date (Local Date)</label>
          <input type="date" id="eventDate" placeholder="Event Date (Local Date)"/>
        </div>

        <div class="input-block">
          <label for="eventTime">Event Time (Local Time)</label>
          <input type="time" id="eventTime" placeholder="Event Time (Local Time)"/>
        </div>

        <div class="input-block">
          <label for="eventLocation">Event Location</label>
          <input type="text" id="eventLocation" placeholder="Event Location"/>
        </div>

        <div class="input-block">
          <label for="streetAddress">Street Address</label>
          <input type="text" id="streetAddress" placeholder="Street Address"/>
        </div>

        <div class="btn-row">
          <button class="btn-back" onclick="prevStep()">Back</button>
          <button class="btn-next" onclick="nextStep()">Next</button>
        </div>

      </div>

      <!-- STEP 3 — City, Region & Category -->
      <div class="step hidden" id="step3">

        <div class="input-block">
          <label for="city">City</label>
          <input type="text" id="city" placeholder="City"/>
        </div>

        <div class="input-block">
          <label for="countryState">Country/State</label>
          <input type="text" id="countryState" placeholder="Country/State"/>
        </div>

        <div class="input-block">
          <label for="eventRegion">Select Event Region</label>
          <div class="select-wrap">
            <select id="eventRegion">
              <option value="" disabled selected>Select Event Region</option>
              <option value="north">North</option>
              <option value="south">South</option>
              <option value="east">East</option>
              <option value="west">West</option>
            </select>
            <span class="select-arrow">&#8964;</span>
          </div>
        </div>

        <div class="input-block">
          <label for="eventCategory">Event Category</label>
          <div class="select-wrap">
            <select id="eventCategory">
              <option value="" disabled selected>Category</option>
              <option value="music">Music</option>
              <option value="sports">Sports</option>
              <option value="tech">Tech</option>
              <option value="food">Food</option>
              <option value="art">Art</option>
              <option value="business">Business</option>
            </select>
            <span class="select-arrow">&#8964;</span>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn-back" onclick="prevStep()">Back</button>
          <button class="btn-next" onclick="nextStep()">Next</button>
        </div>

      </div>

      <!-- STEP 4 — Banner & Others -->
      <div class="step hidden" id="step4">

        <div class="input-block">
          <label for="eventBanner">Event Banner</label>
          <div class="upload-wrap" onclick="document.getElementById('bannerInput').click()">
            <span id="uploadLabel">Upload Image</span>
            <span class="upload-icon">&#128444;</span>
            <input type="file" id="bannerInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>
          </div>
        </div>

        <div class="input-block">
          <label for="others">Others</label>
          <textarea id="others" placeholder="Please include all necessary details for the event......"></textarea>
        </div>

        <button class="btn-create" onclick="handleSubmit()">Create Event</button>

      </div>

    </div>
  </div>

  <script src="create-event.js"></script>

</body>
</html>
