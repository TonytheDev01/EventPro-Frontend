<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Event Error —EventPro</title>

    <link rel="stylesheet" href="../styles/create-event-err.css" />
  </head>
  <body>
    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
      <div class="nav-left">
        <!-- Logo (logo was deleted) -->
        <div class="logo">E</div>
        <span class="brand">EventPro</span>
      </div>

      <nav id="navLinks" class="nav-links">
        <a href="#">Discover</a>
        <a href="#">Events</a>
        <a href="#" class="active">Create Event</a>
        <a href="#">My Events</a>
      </nav>

      <div class="nav-right">
        <!-- ======img was also deleted======= -->
        <img src="https://i.pravatar.cc/40" class="avatar" />

        <!-- Hamburger -->
        <button id="menuBtn" class="menu-btn">☰</button>
      </div>
    </header>

    <!-- ================= PAGE ================= -->
    <main class="page">
      <!-- top actions -->
      <div class="top-actions">
        <button id="backBtn" class="icon-btn">←</button>
      </div>

      <section class="form-header">
        <h1>Create an Event</h1>
        <p>Ready to bring people together? Add your event details below.</p>
      </section>

      <!-- ================= FORM ================= -->
      <form class="event-form">
        <div class="form-grid">
          <div class="field">
            <label>First Name</label>
            <input type="text" placeholder="First Name" />
          </div>

          <div class="field">
            <label>Last Name</label>
            <input type="text" placeholder="Last Name" />
          </div>

          <div class="field full">
            <label>Email Address</label>
            <input type="email" placeholder="Email Address" />
          </div>

          <div class="field full">
            <label>Event Name</label>
            <input type="text" placeholder="Event Name" />
          </div>

          <div class="field">
            <label>Event Date(Local Date)</label>
            <input type="date" placeholder="Event Date(Local Date)" />
          </div>

          <div class="field">
            <label>Event Time(Local Time)</label>
            <input type="time" placeholder="Event Time(Local Time)" />
          </div>

          <div class="field">
            <label>Event Location</label>
            <input type="text" placeholder="Event Location" />
          </div>

          <div class="field">
            <label>Street Address</label>
            <input type="text" placeholder="Street Address" />
          </div>

          <div class="field">
            <label>City</label>
            <input type="text" placeholder="City" />
          </div>

          <div class="field">
            <label>Country / State</label>
            <input type="text" placeholder="Country/State" />
          </div>

          <div class="field">
            <label>Select Event Region</label>
            <select>
              <option>Select Event Region</option>
            </select>
          </div>

          <div class="field">
            <label>Event Category</label>
            <select>
              <option>Category</option>
            </select>
          </div>

          <div class="field">
            <label>Event Banner</label>
            <input type="file" placeholder="Upload Image" />
          </div>

          <div class="field full">
            <label>Others</label>
            <input type="text"
              placeholder="Please include all necessary details..."
            ></input>
          </div>
        </div>

        <p class="error">*Error: Please fill all columns*</p>

        <button class="submit-btn">Create Event</button>
      </form>
    </main>
    <script src="../js/create-event-err.js"></script>
  </body>
</html>
