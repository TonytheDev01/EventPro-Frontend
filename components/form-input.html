<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inline Validation States — EventPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/form-input.css" />
</head>
<body>

  <h1>Inline Validation States</h1>

  <div class="wrapper">

    <!-- LEFT CARD — First Name -->
    <div class="card">

      <!-- 1. Default -->
      <div class="input-block">
        <label>First Name</label>
        <input type="text" class="state-default" placeholder="Enter here..." />
        <span class="helper hidden">_</span>
      </div>

      <!-- 2. Focus -->
      <div class="input-block">
        <label>First Name</label>
        <div class="focus-wrapper">
          <input type="text" placeholder="Enter here..." />
        </div>
        <span class="helper hidden">_</span>
      </div>

      <!-- 3. Error -->
      <div class="input-block">
        <label>First Name</label>
        <input type="text" class="state-error" placeholder="Enter here..." />
        <span class="helper error-text">Please enter your first and last name</span>
      </div>

      <!-- 4. Success -->
      <div class="input-block">
        <label>First Name</label>
        <input type="text" class="state-success" placeholder="Enter here..." />
        <span class="helper success-text">Name accepted</span>
      </div>

    </div>

    <!-- RIGHT CARD — Email -->
    <div class="card">

      <!-- 1. Default -->
      <div class="input-block">
        <label>Email</label>
        <input type="email" class="state-default" placeholder="Enter here..." />
        <span class="helper hidden">_</span>
      </div>

      <!-- 2. Focus -->
      <div class="input-block">
        <label>Email</label>
        <div class="focus-wrapper">
          <input type="email" placeholder="Enter here..." />
        </div>
        <span class="helper hidden">_</span>
      </div>

      <!-- 3. Error -->
      <div class="input-block">
        <label>Email</label>
        <input type="email" class="state-error" placeholder="Enter here..." />
        <span class="helper error-text">Please enter a valid email address</span>
      </div>

      <!-- 4. Success -->
      <div class="input-block">
        <label>Email</label>
        <input type="email" class="state-success" placeholder="Enter here..." />
        <span class="helper success-text">Email looks good!</span>
      </div>

    </div>

  </div>

</body>
</html>
