<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Event — EventPro</title>
    <link rel="stylesheet" href="../styles/create-event.css" />
  </head>
  <body>
    <!-- ✅ navbar wrapper -->
    <header class="navbar">
      <div class="nav-left">
        <div class="logo">EP</div>
        <span class="brand">EventPro</span>
      </div>

      <nav id="navLinks" class="nav-links">
        <a href="dashboard.html">Discover</a>
        <a href="dashboard.html">Events</a>
        <a href="create-event.html" class="active">Create Event</a>
        <a href="organizer-dashboard.html">My Events</a>
      </nav>

      <div class="nav-right">
        <div class="avatar" id="userAvatar"></div>
        <button
          type="button"
          id="menuBtn"
          class="menu-btn"
          aria-label="Open menu"
        >
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <line
              x1="3"
              y1="6"
              x2="21"
              y2="6"
              stroke="#333"
              stroke-width="2"
              stroke-linecap="round"
            />
            <line
              x1="3"
              y1="12"
              x2="21"
              y2="12"
              stroke="#333"
              stroke-width="2"
              stroke-linecap="round"
            />
            <line
              x1="3"
              y1="18"
              x2="21"
              y2="18"
              stroke="#333"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>
    </header>
    <!-- ✅ navbar wrapper ends here -->

    <!-- ✅ Back button is now OUTSIDE the navbar -->
    <div class="top-actions">
      <button type="button" id="backBtn" class="icon-btn" aria-label="Go back">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M19 12H5M5 12l7 7M5 12l7-7"
            stroke="#222"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>

    <!-- Form header -->
    <section class="form-header">
      <h1>Create an Event</h1>
      <p>Ready to bring people together? Add your event details below.</p>
    </section>

    <!-- ══ FORM ══ -->
    <form class="event-form" id="eventForm" novalidate>
      <div class="form-card">
        <div class="form-grid">
          <div class="field field--full">
            <label for="eventName">Event Name</label>
            <input
              type="text"
              id="eventName"
              name="eventName"
              placeholder="Event Name"
              required
            />
          </div>

          <div class="field">
            <label for="eventDate">Event Date</label>
            <input type="date" id="eventDate" name="eventDate" required />
          </div>

          <div class="field">
            <label for="eventTime">Event Time</label>
            <input type="time" id="eventTime" name="eventTime" required />
          </div>

          <div class="field">
            <label for="eventLocation">Event Location</label>
            <input
              type="text"
              id="eventLocation"
              name="eventLocation"
              placeholder="Event Location"
              required
            />
          </div>

          <div class="field">
            <label for="streetAddress">Street Address</label>
            <input
              type="text"
              id="streetAddress"
              name="streetAddress"
              placeholder="Street Address"
              required
            />
          </div>

          <div class="field">
            <label for="city">City</label>
            <input
              type="text"
              id="city"
              name="city"
              placeholder="City"
              required
            />
          </div>

          <div class="field">
            <label for="countryState">Country / State</label>
            <input
              type="text"
              id="countryState"
              name="countryState"
              placeholder="Country / State"
              required
            />
          </div>

          <div class="field">
            <label for="eventRegion">Select Event Region</label>
            <select id="eventRegion" name="eventRegion" required>
              <option value="">Select Event Region</option>
              <option value="north-america">North America</option>
              <option value="europe">Europe</option>
              <option value="africa">Africa</option>
              <option value="asia">Asia</option>
              <option value="oceania">Oceania</option>
              <option value="south-america">South America</option>
            </select>
          </div>

          <div class="field">
            <label for="eventCategory">Event Category</label>
            <select id="eventCategory" name="eventCategory" required>
              <option value="">Category</option>
              <option value="conference">Conference</option>
              <option value="workshop">Workshop</option>
              <option value="concert">Concert</option>
              <option value="networking">Networking</option>
              <option value="sports">Sports</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="field field--full">
            <label for="eventBanner">Event Banner</label>
            <input
              type="file"
              id="eventBanner"
              name="eventBanner"
              accept="image/*"
            />
          </div>

          <div class="field field--full">
            <label for="eventDescription">Others</label>
            <textarea
              id="eventDescription"
              name="eventDescription"
              placeholder="Please include all necessary details about your event..."
              rows="4"
            ></textarea>
          </div>
        </div>

        <p class="error-message" id="errorMessage"></p>

        <button type="submit" class="btn-submit" id="submitBtn">
          Create Event
        </button>
      </div>
    </form>

    <script src="../js/services/auth-service.js"></script>
    <script src="../js/create-event.js"></script>
  </body>
</html>
