<!-- ================================================
  EventPro — Dashboard Topbar Component
  components/dashboard-topbar.html

  NOTE: This file is kept in sync with _TOPBAR_HTML
  in js/utils/load-components.js.
  load-components.js injects the topbar via JS string
  — this file is a reference copy only.
================================================ -->
<header class="topbar" id="topbar">

  <!-- Mobile hamburger — CSS controls visibility -->
  <button type="button" class="topbar-hamburger"
    id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
    <svg width="22" height="22" viewBox="0 0 24 24"
      fill="none" aria-hidden="true">
      <line x1="3"  y1="6"  x2="21" y2="6"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="3"  y1="12" x2="21" y2="12"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="3"  y1="18" x2="21" y2="18"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Welcome text -->
  <p class="topbar-welcome">
    Welcome, <span class="topbar-username" id="topbarUsername">...</span>
  </p>

  <!-- Right controls -->
  <div class="topbar-controls">

    <!-- Search button -->
    <button type="button" class="topbar-icon-btn"
      id="topbarSearchBtn" aria-label="Open search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8"
          stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Search overlay — hidden by default -->
    <div class="topbar-search-overlay" id="topbarSearchOverlay"
      style="display:none;">
      <input
        type="search"
        class="topbar-search-input"
        id="topbarSearchInput"
        placeholder="Search pages, events, attendees…"
        autocomplete="off"
        aria-label="Search"
      />
      <button type="button" class="topbar-search-close"
        id="topbarSearchClose" aria-label="Close search">&#x2715;</button>
    </div>

    <!-- Notification bell with red dot -->
    <button type="button" class="topbar-icon-btn topbar-bell"
      id="topbarBellBtn" aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round"/>
      </svg>
      <span class="topbar-bell-dot" aria-hidden="true"></span>
    </button>

    <!-- Avatar + profile dropdown -->
    <div class="topbar-avatar-wrap" id="topbarAvatarWrap">
      <button type="button" class="topbar-avatar"
        id="topbarAvatar" aria-label="Account menu"
        aria-haspopup="true" aria-expanded="false">
      </button>

      <div class="topbar-dropdown" id="topbarDropdown"
        style="display:none;" role="menu">

        <div class="topbar-dropdown__header">
          <p class="topbar-dropdown__name"  id="dropdownName">—</p>
          <p class="topbar-dropdown__email" id="dropdownEmail">—</p>
          <span class="topbar-dropdown__role" id="dropdownRole">—</span>
        </div>

        <hr class="topbar-dropdown__divider" />

        <a href="../pages/settings.html"
          class="topbar-dropdown__item" role="menuitem">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
              stroke="currentColor" stroke-width="2"/>
          </svg>
          Settings
        </a>

        <a href="../pages/admin-dashboard.html"
          class="topbar-dropdown__item" role="menuitem"
          id="dropdownDashboard">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          </svg>
          Dashboard
        </a>

        <button type="button"
          class="topbar-dropdown__item topbar-dropdown__item--danger"
          id="dropdownLogout" role="menuitem">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <polyline points="16 17 21 12 16 7"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="21" y1="12" x2="9" y2="12"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Logout
        </button>

      </div>
    </div>

  </div>
</header>
