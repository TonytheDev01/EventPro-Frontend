<!-- ================================================
  EventPro — Dashboard Topbar Component
  components/dashboard-topbar.html
================================================ -->
<header class="topbar" id="topbar">

  <!-- Mobile hamburger — hidden at tablet+ by CSS -->
  <button type="button" class="topbar-hamburger"
    id="hamburgerBtn" aria-label="Open menu">
    <svg width="22" height="22" viewBox="0 0 24 24"
      fill="none" aria-hidden="true">
      <line x1="3"  y1="6"  x2="21" y2="6"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="3"  y1="12" x2="21" y2="12"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="3"  y1="18" x2="21" y2="18"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Welcome text — JS populates the name -->
  <p class="topbar-welcome">
    Welcome, <span class="topbar-username" id="topbarUsername">...</span>
  </p>

  <!-- Right side controls — gap 12px -->
  <div class="topbar-controls">

    <!-- Search -->
    <button type="button" class="topbar-icon-btn" aria-label="Search">
      <svg width="18" height="18" viewBox="0 0 24 24"
        fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="8"
          stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Bell with notification dot -->
    <button type="button" class="topbar-icon-btn topbar-bell"
      aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24"
        fill="none" aria-hidden="true">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="topbar-bell-dot" aria-hidden="true"></span>
    </button>

  </div>
</header>
