<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Admission — EventPro</title>
    <link rel="stylesheet" href="../styles/gen-ad.css" />
  </head>
  <body>
    <main class="container">
      <div class="ticket-card">
        <header class="ticket-header">
          <div class="ticket-header__info">
            <h1 class="ticket-title">General Admission</h1>
            <p class="ticket-sales"><em>Sales end on Mar 20, 2026</em></p>
          </div>
          <div class="ticket-price">$499</div>
        </header>

        <div class="ticket-attendees">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
              stroke="#424B57"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <circle
              cx="9"
              cy="7"
              r="4"
              stroke="#424B57"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"
              stroke="#424B57"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Over 500 attendees registered</span>
        </div>

        <button type="button" id="register-btn" class="btn btn--register">
          Register Now
        </button>

        <hr class="ticket-divider" />

        <div class="ticket-actions">
          <!-- Share button -->
          <button type="button" id="share-btn" class="action-btn">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M17 22C16.1667 22 15.4583 21.7083 14.875 21.125C14.2917 20.5417 14 19.8333 14 19C14 18.9 14.025 18.6667 14.075 18.3L7.05 14.2C6.78333 14.45 6.475 14.646 6.125 14.788C5.775 14.93 5.4 15.0007 5 15C4.16667 15 3.45833 14.7083 2.875 14.125C2.29167 13.5417 2 12.8333 2 12C2 11.1667 2.29167 10.4583 2.875 9.875C3.45833 9.29167 4.16667 9 5 9C5.4 9 5.775 9.071 6.125 9.213C6.475 9.355 6.78333 9.55067 7.05 9.8L14.075 5.7C14.0417 5.58333 14.021 5.471 14.013 5.363C14.005 5.255 14.0007 5.134 14 5C14 4.16667 14.2917 3.45833 14.875 2.875C15.4583 2.29167 16.1667 2 17 2C17.8333 2 18.5417 2.29167 19.125 2.875C19.7083 3.45833 20 4.16667 20 5C20 5.83333 19.7083 6.54167 19.125 7.125C18.5417 7.70833 17.8333 8 17 8C16.6 8 16.225 7.929 15.875 7.787C15.525 7.645 15.2167 7.44933 14.95 7.2L7.925 11.3C7.95833 11.4167 7.97933 11.5293 7.988 11.638C7.99667 11.7467 8.00067 11.8673 8 12C7.99933 12.1327 7.99533 12.2537 7.988 12.363C7.98067 12.4723 7.95967 12.5847 7.925 12.7L14.95 16.8C15.2167 16.55 15.525 16.3543 15.875 16.213C16.225 16.0717 16.6 16.0007 17 16C17.8333 16 18.5417 16.2917 19.125 16.875C19.7083 17.4583 20 18.1667 20 19C20 19.8333 19.7083 20.5417 19.125 21.125C18.5417 21.7083 17.8333 22 17 22Z"
                fill="black"
              />
            </svg>
            Share
          </button>

          <!-- Save button -->
          <button type="button" id="save-btn" class="action-btn">
            <svg
              id="save-icon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <g clip-path="url(#clip0_287_59)">
                <path
                  d="M11.8917 5.186C9.33671 2.90619 6.32216 2.07349 4.1288 3.33981C1.0199 5.1347 0.738211 10.4671 3.49964 15.2501C5.31516 18.3946 7.99401 20.5187 10.4998 21.0949"
                  stroke="black"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M9.12903 8.75005C6.36763 13.533 6.64928 18.8654 9.75818 20.6603C12.8671 22.4552 17.6259 20.033 20.3874 15.2501C23.1488 10.4671 22.8671 5.1347 19.7582 3.33981C16.6493 1.54489 11.8904 3.96714 9.12903 8.75005Z"
                  stroke="black"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </g>
              <defs>
                <clipPath id="clip0_287_59">
                  <rect width="24" height="24" fill="white" />
                </clipPath>
              </defs>
            </svg>
            <span id="save-label">Save</span>
          </button>
        </div>
      </div>
    </main>

    <script src="../js/services/auth-service.js"></script>
    <script src="../js/gen-ad.js"></script>
  </body>
</html>
