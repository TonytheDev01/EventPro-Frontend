<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deactivate Modal</title>
  <link rel="stylesheet" href="..../styles/deactivate-modal.css.css">
</head>

<body>
  <div class="modal-overlay">
  <div class="modal-card">
    <button class="close-x">&times;</button>
    <div class="modal-body">
      <img src="../assets/warning-icon.png" alt="Warning" class="warning-icon">
      <h1>Deactivate Event?</h1>
      <p>This event will no longer be visible to attendees.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary">Cancel</button>
      <button class="btn-danger">Deactivate</button>
    </div>
  </div>
</div>
</body>

</html>
